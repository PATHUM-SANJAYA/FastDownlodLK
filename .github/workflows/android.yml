name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Native Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Prepare Frontend for Capacitor
        run: |
          mkdir -p www
          cp *.html www/
          cp *.css www/
          cp *.js www/
          cp *.json www/
          cp -r assets www/
          
          # Fix script.js to hit the live API when bundled locally in the APK
          sed -i 's/window.location.origin/"https:\/\/fastlk.duckdns.org"/g' www/script.js
          sed -i "s/'http:\/\/localhost:8002'/'https:\/\/fastlk.duckdns.org'/g" www/script.js

      - name: Install Capacitor
        run: |
          npm install @capacitor/core
          npm install @capacitor/cli @capacitor/android -D

      - name: Initialize Capacitor Project
        run: |
          npx cap init "FastdownloadLK" "com.pathum.fastdownloadlk" --web-dir www
          npx cap add android

      - name: Fix Kotlin Duplicate Classes
        run: |
          echo "
          configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }" >> android/app/build.gradle

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastdownloadLK-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
